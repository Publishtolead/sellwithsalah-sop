<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP Builder — النسخة المصرية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#f5f4f0;color:#1a1a1a;direction:rtl}
.page{max-width:760px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
/* HEADER */
.hdr{background:#1a1a1a;border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;color:#fff}
.hdr-logo{font-size:10px;font-weight:700;letter-spacing:.08em;color:#666;margin-bottom:.25rem}
.hdr-title{font-size:22px;font-weight:800;color:#fff}
.hdr-sub{font-size:12px;color:#888;margin-top:2px}
/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:12px;color:#888;margin-bottom:1.25rem}
.bc strong{color:#1a1a1a;font-weight:700}
.bc-sep{opacity:.35}
/* BACK */
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:13px;padding:0;margin-bottom:1.25rem;font-family:'Cairo',sans-serif;font-weight:600}
.back-btn:hover{color:#1a1a1a}
/* PROGRESS BAR */
.prog-wrap{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:.9rem 1.1rem;margin-bottom:1.25rem}
.prog-label{font-size:11px;color:#888;font-weight:700;margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center}
.prog-label span{font-size:11px;color:#888}
.prog-sections{display:flex;gap:4px}
.prog-sec{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border-radius:8px;padding:4px 2px;transition:background .15s}
.prog-sec:hover{background:#f5f4f0}
.prog-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;font-family:-apple-system,sans-serif;transition:all .2s;border:2px solid transparent}
.prog-dot.empty{background:#f0eeea;color:#bbb;border-color:#e0deda}
.prog-dot.partial{background:#fff8e0;color:#b8860b;border-color:#f0c040}
.prog-dot.full{background:#e0f5ec;color:#0a7a4e;border-color:#4caf90}
.prog-dot.active{box-shadow:0 0 0 3px rgba(21,96,189,.3)}
.prog-sec-name{font-size:8px;color:#aaa;text-align:center;line-height:1.3}
/* ROLES */
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.role-card{position:relative;padding:.9rem 1.2rem .85rem 1rem;text-align:right;cursor:pointer;background:#fff;border:1px solid #e8e6e0;border-radius:12px;transition:all .15s;overflow:hidden}
.role-card:hover{border-color:#bbb;background:#fafafa;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.role-accent{position:absolute;right:0;top:0;bottom:0;width:4px;border-radius:0 12px 12px 0}
.role-name{font-weight:800;font-size:13px;color:#1a1a1a;margin-bottom:3px;padding-right:10px}
.role-sub{font-size:11px;color:#888;padding-right:10px;line-height:1.5}
/* LIST/TASK BTNS */
.list-btn{width:100%;padding:.85rem 1.25rem;text-align:right;cursor:pointer;background:#fff;border:1px solid #e8e6e0;border-radius:10px;font-size:14px;font-weight:600;color:#1a1a1a;font-family:'Cairo',sans-serif;transition:all .15s;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.list-btn:hover{background:#fafafa;border-color:#bbb}
.task-btn{width:100%;padding:.8rem 1.25rem;text-align:right;cursor:pointer;background:#fff;border:1px solid #e8e6e0;border-radius:10px;font-size:13.5px;font-weight:600;color:#1a1a1a;font-family:'Cairo',sans-serif;transition:all .15s;margin-bottom:7px;display:flex;align-items:center;gap:10px;flex-direction:row-reverse}
.task-btn:hover{background:#fafafa;border-color:#bbb}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.other-box{margin-top:6px;border:2px dashed #d0cec8;border-radius:12px;padding:1rem 1.25rem;background:#fafaf8}
.other-lbl{font-size:12px;color:#888;margin-bottom:8px;font-weight:700}
.other-row{display:flex;gap:8px;align-items:center;flex-direction:row-reverse}
.other-inp{flex:1;padding:9px 12px;font-size:13px;background:#fff;border:1px solid #e0deda;border-radius:9px;color:#1a1a1a;font-family:'Cairo',sans-serif;outline:none;text-align:right;direction:rtl}
/* SECTION EXPLAIN */
.sec-explain{border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.sec-ex-top{display:flex;align-items:center;gap:10px;flex-direction:row-reverse;margin-bottom:.6rem}
.sec-letter{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;flex-shrink:0;font-family:-apple-system,sans-serif}
.sec-ex-name{font-weight:800;font-size:15px}
.sec-ex-ename{font-size:10px;color:#888;letter-spacing:.04em;margin-top:1px}
.sec-ex-text{font-size:12.5px;line-height:1.75;text-align:right;border-top:1px solid rgba(0,0,0,.08);padding-top:.6rem;margin-top:.1rem}
.sec-count{margin-right:auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px}
/* AI BANNER */
.ai-banner{display:flex;align-items:center;gap:8px;flex-direction:row-reverse;background:#f0f8ff;border:1px solid #b8d8f8;border-radius:10px;padding:.6rem 1rem;margin-bottom:1rem;font-size:12px;color:#1560BD}
.ai-banner.loading{background:#fffbf0;border-color:#f0d878;color:#8a6800}
.ai-banner.done{background:#f0faf5;border-color:#90d8b8;color:#0a6840}
.ai-icon{font-size:16px;flex-shrink:0}
/* FIELD */
.field-block{background:#fff;border:1px solid #e8e6e0;border-radius:12px;overflow:hidden;margin-bottom:.9rem}
.field-hdr{padding:.85rem 1.1rem .65rem;border-bottom:1px solid #f0eeea}
.field-q{font-size:13.5px;font-weight:800;color:#1a1a1a;margin-bottom:5px;display:flex;align-items:center;flex-wrap:wrap;gap:6px;flex-direction:row-reverse;justify-content:flex-start}
.field-hint{font-size:11.5px;color:#888;line-height:1.65;text-align:right}
.field-body{padding:.85rem 1.1rem}
.filled-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:8px}
/* OPTIONS */
.opts-list{display:flex;flex-direction:column;gap:5px;margin-bottom:.75rem}
.opt{display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;background:#fafaf8;border:1.5px solid #e8e6e0;border-radius:9px;transition:all .15s;font-size:13px;font-weight:500;color:#1a1a1a;font-family:'Cairo',sans-serif;text-align:right;width:100%;flex-direction:row-reverse}
.opt:hover{border-color:#bbb;background:#f5f4f0}
.opt.sel{border-width:2px}
.opt-radio{width:18px;height:18px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.opt-radio .dot{width:8px;height:8px;border-radius:50%;background:white;display:none}
.opt.sel .opt-radio .dot{display:block}
.cust-div{display:flex;align-items:center;gap:8px;margin:2px 0 7px;font-size:11px;color:#bbb;font-weight:600}
.cust-div::before,.cust-div::after{content:'';flex:1;height:1px;background:#e8e6e0}
.cust-in{width:100%;padding:9px 12px;font-size:13px;background:#fafaf8;border:1.5px solid #e8e6e0;border-radius:9px;color:#1a1a1a;font-family:'Cairo',sans-serif;outline:none;text-align:right;direction:rtl}
.cust-in:focus{border-color:#aaa;background:#fff}
.cust-in.filled{border-color:#bbb;background:#fff}
/* NAV */
.nav-row{display:flex;gap:10px;margin-top:1.5rem;flex-direction:row-reverse}
.btn-back-s{flex:1;padding:.8rem;cursor:pointer;background:#fff;border:1px solid #e0deda;border-radius:10px;font-size:14px;font-weight:600;color:#555;font-family:'Cairo',sans-serif}
.btn-next{flex:2;padding:.8rem;cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:800;color:#fff;font-family:'Cairo',sans-serif}
/* MISSING */
.missing-wrap{background:#fff;border:1px solid #f0c0c0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.missing-title{font-size:15px;font-weight:800;color:#9e2222;margin-bottom:.75rem;display:flex;align-items:center;gap:8px;flex-direction:row-reverse}
.missing-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem .75rem;background:#fdf5f5;border-radius:8px;margin-bottom:6px;flex-direction:row-reverse}
.missing-item-text{font-size:12.5px;color:#555;text-align:right}
.missing-item-btn{font-size:11px;font-weight:700;color:#9e2222;background:none;border:1px solid #f0c0c0;border-radius:6px;padding:3px 10px;cursor:pointer;font-family:'Cairo',sans-serif;white-space:nowrap}
.missing-note{font-size:12px;color:#888;margin-top:.75rem;text-align:right}
.btn-preview-anyway{width:100%;padding:.75rem;cursor:pointer;background:#f5f4f0;border:1px solid #e0deda;border-radius:10px;font-size:13px;font-weight:600;color:#888;font-family:'Cairo',sans-serif;margin-top:.5rem}
/* PREVIEW */
.preview-bar{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;background:#fff;border-radius:12px;border:1px solid #e8e6e0;margin-bottom:.75rem;flex-direction:row-reverse}
.preview-bar h2{font-size:15px;font-weight:800;margin-bottom:2px}
.preview-bar p{font-size:12px;color:#888}
.btn-print{padding:.65rem 1.5rem;cursor:pointer;border:none;border-radius:9px;font-size:14px;font-weight:800;color:#fff;font-family:'Cairo',sans-serif}
.btn-edit-last{background:none;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#888;font-family:'Cairo',sans-serif}
.ptbl{width:100%;border-collapse:collapse;direction:rtl}
.ptbl th{padding:7px 11px;background:#f5f4f0;font-weight:800;text-align:right;font-size:10px;color:#888;border-bottom:1px solid #e8e6e0}
.ptbl td{padding:7px 11px;border-bottom:1px solid #f0eeea;vertical-align:top}
.ptbl tr:last-child td{border-bottom:none}
.ptbl .lc{text-align:center;font-size:18px;font-weight:900;border-left:1px solid #f0eeea;width:34px;font-family:-apple-system,sans-serif}
.ptbl .nc{font-weight:700;font-size:11px;color:#555;border-left:1px solid #f0eeea;width:105px;background:#fafaf8;text-align:right}
.ptbl .empty-row td{background:#fffaf5}
.ql{font-size:10px;color:#aaa;margin-bottom:3px;text-align:right}
.atag{display:inline-block;padding:3px 10px;border-radius:9px;font-size:12px;font-weight:700;margin:2px 0 2px 4px}
.aempty{color:#e0a0a0;font-size:11px;font-style:italic}
.step-label{font-size:13px;color:#888;margin-bottom:1.25rem;font-weight:600}
@media print{.no-print{display:none!important}body{background:#fff}.ptbl td,.ptbl th{border-color:#ddd!important}.ptbl .nc{background:#f5f5f5!important}}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="hdr-logo">SOP BUILDER — نسخة السوق المصري</div>
    <div class="hdr-title">نموذج S.T.A.N.D.A.R.D.</div>
    <div class="hdr-sub">لتوثيق إجراءات التشغيل المعيارية باحترافية</div>
  </div>
  <div id="app"></div>
</div>
<script>
const ROLES=[
  {id:'sales',color:'#1560BD',label:'مبيعات',sub:'إغلاق صفقات، استقطاب، متابعة',contexts:[
    {id:'realestate',label:'عقارات',tasks:['عملية تأهيل العملاء المحتملين','إجراء معاينة العقار','تقديم العرض والتفاوض','متابعة العميل بعد المعاينة','إتمام البيع والتسليم']},
    {id:'medrep',label:'مندوب طبي / دوائي',tasks:['زيارة الطبيب وتقديم المنتج','توزيع العينات الطبية','تخطيط مسار الزيارات','تقديم العرض العلمي','إدارة طلبات وإعادة التخزين']},
    {id:'b2b',label:'مبيعات للشركات (B2B)',tasks:['التواصل مع العملاء المحتملين','اجتماع الاكتشاف والعرض','تقديم العرض المالي','التفاوض وإغلاق العقد','متابعة تجديد الاشتراك']},
    {id:'retail',label:'بيع بالتجزئة / نقطة بيع',tasks:['استقبال العميل وفهم احتياجاته','توصية المنتج المناسب','عملية البيع الإضافي','إتمام الدفع والتسليم','الاستبدال والاسترجاع']},
    {id:'insurance',label:'تأمين',tasks:['استقبال وتأهيل العميل','تقديم الوثيقة والشرح','إصدار عرض أسعار','التعامل مع الاعتراضات','تجديد الوثيقة']},
    {id:'auto',label:'معارض سيارات',tasks:['استقبال الزبون في المعرض','جولة الاختبار (Test Drive)','التمويل والتأجير','تقييم السيارة المستعملة','تسليم السيارة']},
    {id:'fmcg',label:'سلع استهلاكية (FMCG)',tasks:['تغطية نقاط البيع اليومية','مفاوضة التوزيع والرف','إدارة الترويج والعروض','تحصيل المستحقات','متابعة مخزون العميل']},
    {id:'telecom',label:'اتصالات',tasks:['بيع خطط الاشتراك الجديدة','ترقية الباقة للعميل','تجديد العقود','بيع الأجهزة والملحقات','استرداد العملاء المنسحبين']},
  ]},
  {id:'operations',color:'#0a7a4e',label:'عمليات',sub:'تشغيل، لوجستيات، تنفيذ',contexts:[
    {id:'mfg',label:'تصنيع',tasks:['تشغيل خط الإنتاج','فحص الجودة أثناء الإنتاج','صيانة الآلات','تسليم الورديات','تجديد المواد الخام']},
    {id:'logistics_ops',label:'لوجستيات وتوصيل',tasks:['إرسال وتوزيع الطلبات','توصيل الشحنات للعملاء','الإرجاع والاستلام','استلام البضاعة بالمخزن','إحاطة السائقين']},
    {id:'restaurant_ops',label:'مطاعم وكافيهات',tasks:['إجراءات فتح الفرع يومياً','تحضير وتجهيز الطعام','تنفيذ الطلبات وتسليمها','إجراءات الإغلاق','إحاطة فريق العمل']},
    {id:'ecom_ops',label:'تجارة إلكترونية',tasks:['تنفيذ الطلبيات وشحنها','إدارة المخزون','الاسترجاع واسترداد المبلغ','التنسيق مع شركات الشحن','الطلبيات التالفة']},
    {id:'construct',label:'مقاولات وبناء',tasks:['إحاطة السلامة في الموقع','تقرير سير العمل اليومي','طلب مواد البناء','تنسيق المقاولين','تسليم المشروع']},
  ]},
  {id:'hr',color:'#6b3fa0',label:'موارد بشرية',sub:'توظيف، تأهيل، ثقافة',contexts:[
    {id:'corp_hr',label:'شركات كبرى',tasks:['نشر الوظيفة والبحث','إجراء المقابلات والاختيار','تأهيل الموظف الجديد','إنهاء الخدمة والخروج','تقييم الأداء السنوي']},
    {id:'factory_hr',label:'مصانع وشركات صناعية',tasks:['توظيف عمال الإنتاج','التحقق من الشهادات','تأهيل العمال الجدد','جدولة الورديات','تسجيل الغياب والجزاءات']},
    {id:'startup_hr',label:'شركات ناشئة',tasks:['توظيف سريع','عرض العمل وعقد التوظيف','تأهيل عن بُعد','جلسة تقييم ثقافي','إدارة النزاعات']},
    {id:'agency_hr',label:'مكاتب توظيف',tasks:['استقطاب المرشحين','فرز السيرة الذاتية','التنسيق مع الشركات','إتمام الإحالة والتعيين','متابعة المرشح بعد التعيين']},
  ]},
  {id:'marketing',color:'#b84a1a',label:'تسويق',sub:'حملات، محتوى، عملاء',contexts:[
    {id:'agency_mkt',label:'وكالة إعلانية / رقمية',tasks:['تأهيل العميل الجديد','استلام وتحليل البريف','اعتماد المحتوى والتصاميم','التقرير الشهري للعميل','إنهاء التعاقد']},
    {id:'brand_mkt',label:'براند / تجارة إلكترونية',tasks:['إطلاق حملة منتج جديد','إدارة الإعلانات المدفوعة','إعداد Email Campaign','إدارة المؤثرين','تخطيط عروض المواسم']},
    {id:'events_mkt',label:'فعاليات وتنشيط',tasks:['تخطيط الفعالية','حجز القاعة والموردين','تنفيذ الفعالية','تقرير ما بعد الفعالية','إدارة الرعاة']},
    {id:'social_content',label:'سوشيال ميديا',tasks:['تقويم المحتوى الشهري','إعداد واعتماد المنشور','إدارة التعليقات','الإعلانات المعززة','التقرير الشهري']},
  ]},
  {id:'cs',color:'#8a4200',label:'خدمة العملاء',sub:'دعم، شكاوى، استبقاء',contexts:[
    {id:'ecom_cs',label:'تجارة إلكترونية',tasks:['الرد على استفسارات الطلبيات','الإرجاع واسترداد المبلغ','تصعيد الشكاوى','التعامل مع Chargeback','متابعة ما بعد الشراء']},
    {id:'telecom_cs',label:'اتصالات وإنترنت',tasks:['الدعم الفني','توصيل خط جديد','اعتراضات الفاتورة','تصعيد للفريق الميداني','الاحتفاظ بالعميل المنسحب']},
    {id:'bank_cs',label:'بنوك ومؤسسات مالية',tasks:['فتح حساب جديد','اعتراض على معاملة','استفسار عن قرض','بطاقة مسروقة أو مفقودة','التحقق من هوية العميل']},
    {id:'hotel_cs',label:'فنادق وضيافة',tasks:['تسجيل وصول الضيف','التعامل مع شكوى الضيف','خدمة الغرف والطلبات','تسجيل المغادرة','الحصول على تقييم الضيف']},
  ]},
  {id:'finance',color:'#1a6b2e',label:'مالية ومحاسبة',sub:'تقارير، فواتير، امتثال',contexts:[
    {id:'corp_fin',label:'شركات كبرى',tasks:['إقفال الشهر المحاسبي','اعتماد طلبات الصرف','معالجة الفواتير','إعداد الموازنة','التحضير للمراجعة الخارجية']},
    {id:'acc_firm',label:'مكتب محاسبة',tasks:['تأهيل عميل جديد','إعداد الإقرار الضريبي','مراجعة دفاتر الحسابات','إعداد القوائم المالية','التقرير الدوري للعميل']},
    {id:'startup_fin',label:'شركات ناشئة وصغيرة',tasks:['إدارة الصندوق النثري','تشغيل كشف المرتبات','تقرير المستثمرين','متابعة السيولة','الإقرار الضريبي']},
  ]},
  {id:'legal',color:'#9e2222',label:'قانوني',sub:'عقود، امتثال، عملاء',contexts:[
    {id:'lawfirm',label:'مكتب محاماة',tasks:['استقبال العميل وتأهيل القضية','صياغة العقود','تقديم مستندات للمحكمة','إدارة ملفات القضايا','إعداد الفواتير']},
    {id:'corp_legal',label:'قانوني داخلي (شركات)',tasks:['مراجعة اتفاقيات NDA','التدقيق في الالتزام التنظيمي','التعاقد مع الموردين','حماية الملكية الفكرية','إجراءات التسوية']},
    {id:'realestate_legal',label:'قانوني عقارات',tasks:['فحص سجل الملكية','مراجعة عقود البيع','التحقق من التراخيص','وثائق التسجيل العقاري','فض النزاعات']},

'doc_when':["التذاكر تُحدَّث في الوقت الفعلي أثناء كل تفاعل مع العميل","بيانات CSAT تُجمَع فور إغلاق كل تذكرة","تقرير الأداء الأسبوعي يُرفَع كل اثنين لمدير الخدمة","SOP يُراجَع ربعياً أو عند تغيير السياسة","SOP يُحدَّث عند تغيير منصة التجارة أو أدوات الدعم"],

function getFallback(key,roleLabel,ctxLabel,taskName){
  const t=taskName,r=roleLabel;
  const map={
    s_task:[`تنفيذ إجراء ${t} بالكامل`,`إدارة ${t} وفق المعيار المحدد`,`تشغيل ${t} بشكل منتظم`,`توثيق وتنفيذ ${t} بدون أخطاء`],

    s_end:[`تسليم مخرج ${t} والتأكيد`,`اكتمال جميع خطوات ${t}`,`تحديث النظام وإغلاق السجل`,`استلام تأكيد الاكتمال من المسؤول`],
    s_included:[`جميع خطوات ${t} من الاستلام للتسليم`,`التواصل مع الأطراف المعنية`,`التوثيق وحفظ السجلات في كل مرحلة`,`الفحوصات والموافقات المطلوبة`],
    s_excluded:[`المهام التي تختص بها إدارات أخرى`,`الحالات الاستثنائية التي تحتاج موافقة أعلى`,`الإجراءات الموثقة في SOP منفصل`,`المواقف الطارئة خارج النطاق`],
    t_starts:[`استلام طلب جديد لـ ${t}`,`تعليمات المشرف بالبدء`,`وصول حدث أو موعد مجدول`,`استيفاء الشروط السابقة للبدء`],
    t_signal:[`رسالة واتساب أو إيميل بالطلب`,`إشعار النظام تلقائياً`,`اتصال تليفوني أو طلب شخصي`,`اعتماد من المسؤول السابق`],
    a_why:[`ضمان تنفيذ ${t} بشكل متسق`,`تقليل الأخطاء في ${t}`,`توفير تجربة احترافية ومتوقعة`,`الالتزام بمعايير الجودة`],
    a_outcome:[`إتمام ${t} بدقة في الموعد`,`رضا الأطراف المعنية عن النتيجة`,`بيانات محدثة ودقيقة في النظام`,`تقليل وقت الإشراف اليومي`],
    n_accountable:[`مشرف ${r} المسؤول عن الفريق`,`مدير قسم ${r}`,`كبير المتخصصين في ${r}`,`صاحب العملية (Process Owner)`],
    n_executes:[`موظف ${r} المكلف بالمهمة`,`متخصص أو فني ${r}`,`موظف مبتدئ تحت إشراف`,`أي موظف مؤهل ومدرب`],
    n_approves:[`المشرف المباشر أو مدير الفريق`,`مدير الإدارة أو رئيس القسم`,`مسؤول الجودة أو الامتثال`,`الإدارة المالية للمبالغ فوق الحد`],
    n_informed:[`جميع أفراد الفريق المشاركين`,`الإدارة العليا وأصحاب المصلحة`,`العميل أو الطرف الخارجي`,`الإدارة المالية للتوثيق`],
    d_steps:[`١. استلم ← ٢. تحقق ← ٣. نفّذ ← ٤. راجع ← ٥. سلّم ← ٦. وثّق`,`استلام ← تحقق ← تنفيذ ← مراجعة ← اعتماد ← إغلاق`,`اتبع قائمة تدقيق ${t} من ٦ خطوات`,`اتبع الدليل التشغيلي المعتمد`],
    d_tools:[`نظام CRM أو التشغيل الرئيسي`,`الإيميل وتطبيقات التواصل (واتساب)`,`Google Drive أو SharePoint`,`برنامج متخصص في المجال`],
    d_output:[`سجل مكتمل في النظام`,`تسليم معتمد من الطرف المعني`,`تقرير مرسل للمسؤولين`,`تأكيد الاكتمال من العميل`],
    ac_done:[`اكتمال جميع الخطوات بدون بنود مفتوحة`,`المخرج يستوفي معيار الجودة`,`الطرف المعني أكد رضاه`,`جميع المستندات مكتملة ومحفوظة`],

    ac_mustbe:[`صفر أخطاء في المخرج النهائي`,`جميع الموافقات المطلوبة اكتملت`,`الموعد النهائي ملتزَم به`,`الالتزام الكامل بالسياسات`],
    r_wrong:[`معلومات ناقصة في مرحلة الاستلام`,`تأخير من طرف خارجي`,`عطل النظام أو مشكلة تقنية`,`غياب موظف أو ضغط على الطاقة`],
    r_exceptions:[`طلب عاجل خارج التدفق المعتاد`,`تغيير المتطلبات في منتصف التنفيذ`,`استثناء امتثالي يحتاج مراجعة`,`حالة عالية القيمة تحتاج موافقة خاصة`],
    r_when:[`احتمال تأخر الموعد النهائي`,`المشكلة تتجاوز صلاحيات المنفذ`,`يصعّد العميل شكوى`,`اكتشاف خطر امتثال أو قانوني`],
    r_whom:[`المشرف المباشر أو مدير الفريق`,`مدير الإدارة أو رئيس القسم`,`المسؤول القانوني أو الامتثالي`,`الدعم التقني لأعطال الأنظمة`],
    doc_what:[`سجل المهمة مع النتيجة والملاحظات`,`جميع المراسلات والموافقات`,`أي استثناءات أو تصعيدات`,`مؤشرات الأداء والوقت والجودة`],
    doc_where:[`نظام CRM أو التشغيل الرئيسي`,`Google Drive أو SharePoint`,`أداة إدارة المشاريع`,`أرشيف البريد الإلكتروني`],
    doc_when:[`فور اكتمال كل تنفيذ للإجراء`,`كل ٦ أشهر أو عند تغيير في العملية`,`بعد أي مشكلة أو تدقيق`,`عند إضافة أدوات أو أنظمة جديدة`],
  };
  return map[key]||[`خيار أ لـ ${t}`,`خيار ب لـ ${ctxLabel}`,`خيار ج وفق المعايير`,`خيار د وفق تفضيل الفريق`];
}

function getFieldOpts(key,ctxId,roleLabel,ctxLabel,taskName){
  if(CTX_OPTS[ctxId]&&CTX_OPTS[ctxId][key]) return CTX_OPTS[ctxId][key];
  return getFallback(key,roleLabel,ctxLabel,taskName);
}


/* ============ STATE FUNCTIONS ============ */
let ST={
  step:'role', role:null, ctx:null, task:null, secIdx:0,
  answers:{},
  visited:new Set()
};
function setState(patch){ST=Object.assign({},ST,patch);render();}
function setAnswer(key,val){const a=Object.assign({},ST.answers);a[key]=val;ST=Object.assign({},ST,{answers:a});render();}
function clearAnswer(key){const a=Object.assign({},ST.answers);delete a[key];ST=Object.assign({},ST,{answers:a});render();}
function getAns(k){return(ST.answers[k]||'').trim();}

function getSecProgress(sec){
  const filled=sec.fields.filter(f=>ST.answers[f.key]&&ST.answers[f.key].trim()).length;
  return{filled,total:sec.fields.length};
}
function totalFilled(){return SECTIONS.reduce((s,sec)=>s+getSecProgress(sec).filled,0);}
function totalFields(){return SECTIONS.reduce((s,sec)=>s+sec.fields.length,0);}

function goSec(idx){
  const vis=new Set(ST.visited);vis.add(idx);
  ST=Object.assign({},ST,{step:'section',secIdx:idx,visited:vis});
  render();
}


function bc(){
  const role=ROLES.find(r=>r.id===ST.role);if(!role)return'';
  const ctx=ST.ctx?role.contexts.find(c=>c.id===ST.ctx):null;
  let h='<div class="bc">';
  h+=`<strong>${role.label}</strong>`;
  if(ctx)h+=`<span class="bc-sep">›</span><strong>${ctx.label}</strong>`;
  if(ST.task)h+=`<span class="bc-sep">›</span><strong>${ST.task}</strong>`;
  return h+'</div>';
}

/* ============ PROGRESS BAR ============ */
function progressBar(activeSec){
  const filled=totalFilled(),total=totalFields();
  const pct=total?Math.round(filled/total*100):0;
  const dots=SECTIONS.map((sec,i)=>{
    const p=getSecProgress(sec);
    const cls=p.filled===0?'empty':p.filled===p.total?'full':'partial';
    const active=(activeSec===i)?'active':'';
    const cursor=ST.task?'style="cursor:pointer"':'';
    return`<div class="prog-sec" ${ST.task?`onclick="goSec(${i})"`:''}  >
      <div class="prog-dot ${cls} ${active}" style="${active&&activeSec!==undefined?`border-color:${SECTIONS[i].color};box-shadow:0 0 0 3px ${SECTIONS[i].color}33`:''}">${sec.letter}</div>
      <div class="prog-sec-name">${sec.name.substring(0,4)}</div>
    </div>`;
  }).join('');
  return`<div class="prog-wrap">
    <div class="prog-label">
      <span>تقدم ملء الـ SOP</span>
      <span style="font-weight:800;color:#1a1a1a">${filled} / ${total} حقل (${pct}%)</span>
    </div>
    <div class="prog-sections">${dots}</div>
  </div>`;
}

function secStep(){
  const sec=SECTIONS[ST.secIdx];
  const aiBanner=`<div class="ai-banner done"><span class="ai-icon">✓</span><span>الخيارات محددة خصيصاً لـ <strong>${ST.task}</strong> في قطاع <strong>${ROLES.find(r=>r.id===ST.role)?.label||''}</strong> — اختر أو اكتب إجابتك الخاصة</span></div>`;

  const progress=SECTIONS.map((_,i)=>`<div style="flex:1;height:4px;border-radius:2px;background:${i<=ST.secIdx?sec.color:'#e0deda'};transition:background .3s"></div>`).join('');

  const fields=sec.fields.map(f=>{
    const role2=ROLES.find(r=>r.id===ST.role);const ctx2=role2?role2.contexts.find(c=>c.id===ST.ctx):null;const opts=getFieldOpts(f.key,ST.ctx,role2?role2.label:'',ctx2?ctx2.label:'',ST.task||'');
    const ans=ST.answers[f.key]||'';
    const isFilled=!!ans.trim();
    // Check if saved answer matches one of the current options
    const matchedOpt=opts.find(o=>o===ans);
    const isCustom=isFilled&&!matchedOpt;

    const optHtml=opts.map(o=>{
      const isSel=(o===ans);
      const safe=o.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      return`<button class="opt${isSel?' sel':''}"
        style="${isSel?`border-color:${sec.color};background:${sec.bg};color:${sec.color}`:''}"
        onclick="setAnswer('${f.key}','${safe}');document.getElementById('ci_${f.key}').value='';">
        <div class="opt-radio" style="${isSel?`background:${sec.color};border-color:${sec.color}`:''}">
          <div class="dot"></div>
        </div>
        <span>${o}</span>
      </button>`;
    }).join('');

    return`<div class="field-block">
      <div class="field-hdr">
        <div class="field-q">
          ${f.q}
          ${isFilled?`<span class="filled-badge" style="background:${sec.bg};color:${sec.color}">✓ مكتمل</span>`:`<span class="filled-badge" style="background:#fff8f0;color:#d09020">مطلوب</span>`}
        </div>
        <div class="field-hint">${f.hint}</div>
      </div>
      <div class="field-body">
        <div class="opts-list">${optHtml}</div>
        <div class="cust-div">أو اكتب إجابتك الخاصة</div>
        <input id="ci_${f.key}" class="cust-in${isCustom?' filled':''}" type="text"
          placeholder="اكتب هنا..."
          value="${isCustom?ans.replace(/"/g,'&quot;'):''}"
          oninput="if(this.value.trim()){setAnswer('${f.key}',this.value);}else{clearAnswer('${f.key}');}"/>
        ${isCustom?`<div style="font-size:11px;color:${sec.color};margin-top:4px;font-weight:600">✓ إجابتك الخاصة: ${ans}</div>`:''}
      </div>
    </div>`;
  }).join('');

  const isLast=ST.secIdx===SECTIONS.length-1;
  const filled=totalFilled(),total=totalFields();

  return`
  <button class="back-btn" onclick="${ST.secIdx===0?"setState({step:'task'})":`goSec(${ST.secIdx}-1)`}">← رجوع</button>
  ${bc()}
  ${progressBar(ST.secIdx)}
  ${aiBanner}
  <div class="sec-explain" style="background:${sec.bg}18;border:1px solid ${sec.color}22">
    <div class="sec-ex-top">
      <div class="sec-letter" style="background:${sec.bg};color:${sec.color}">${sec.letter}</div>
      <div>
        <div class="sec-ex-name" style="color:${sec.color}">${sec.name}</div>
        <div class="sec-ex-ename">${sec.ename} · قسم ${ST.secIdx+1} من ${SECTIONS.length}</div>
      </div>
      <div class="sec-count" style="background:${sec.bg};color:${sec.color}">${getSecProgress(sec).filled}/${sec.fields.length} مكتمل</div>
    </div>
    <div class="sec-ex-text" style="color:#444">${sec.explain}</div>
  </div>
  ${fields}
  <div class="nav-row">
    <button class="btn-back-s" onclick="${ST.secIdx===0?"setState({step:'task'})":`goSec(${ST.secIdx}-1)`}">← رجوع</button>
    <button class="btn-next" style="background:${sec.color}" onclick="${isLast?"checkAndPreview()":`goSec(${ST.secIdx}+1)`}">
      ${isLast?`معاينة وطباعة (${filled}/${total}) ←`:'القسم التالي ←'}
    </button>
  </div>`;
}

function getMissingFields(){
  const missing=[];
  SECTIONS.forEach((sec,si)=>{
    sec.fields.forEach(f=>{
      if(!ST.answers[f.key]||!ST.answers[f.key].trim()){
        missing.push({secIdx:si,secName:sec.name,secLetter:sec.letter,secColor:sec.color,secBg:sec.bg,fieldKey:f.key,fieldQ:f.q});
      }
    });
  });
  return missing;
}

window.checkAndPreview=function(){
  const missing=getMissingFields();
  if(missing.length>0){setState({step:'missing'});}
  else{setState({step:'preview'});}
};

function missingStep(){
  const missing=getMissingFields();
  const filled=totalFilled(),total=totalFields();
  const items=missing.map(m=>`
    <div class="missing-item">
      <div class="missing-item-text">
        <span style="display:inline-block;width:22px;height:22px;border-radius:50%;background:${m.secBg};color:${m.secColor};font-weight:800;font-size:11px;text-align:center;line-height:22px;margin-left:6px;font-family:-apple-system,sans-serif">${m.secLetter}</span>
        ${m.secName} — <strong>${m.fieldQ}</strong>
      </div>
      <button class="missing-item-btn" onclick="goSec(${m.secIdx})">اذهب للتعبئة ←</button>

  return`
  ${bc()}
  ${progressBar()}
  <div class="missing-wrap">
    <div class="missing-title">
      <span>⚠</span>

    ${items}

  </div>
  <div class="nav-row" style="flex-direction:row-reverse">
    <button class="btn-next" style="background:#1560BD;flex:2" onclick="setState({step:'preview'})">معاينة على أي حال (${filled}/${total}) ←</button>
    <button class="btn-back-s" style="flex:1" onclick="goSec(${SECTIONS.length-1})">← إكمال التعبئة</button>
  </div>`;
}

function previewStep(){
  const role=ROLES.find(r=>r.id===ST.role);
  const ctx=role.contexts.find(c=>c.id===ST.ctx);
  const filled=totalFilled(),total=totalFields();
  const rows=SECTIONS.map(sec=>sec.fields.map((f,fi)=>{
    const ans=ST.answers[f.key]||'';
    const isEmpty=!ans.trim();
    const lc=fi===0?`<td class="lc" rowspan="${sec.fields.length}" style="color:${sec.color};background:${sec.bg}">${sec.letter}</td>`:'';
    const nc=fi===0?`<td class="nc" rowspan="${sec.fields.length}">${sec.name}</td>`:'';
    const content=ans
      ?`<span class="atag" style="background:${sec.bg};color:${sec.color}">${ans}</span>`
      :`<span class="aempty">— غير مكتمل</span>`;
    return`<tr class="${isEmpty?'empty-row':''}">${lc}${nc}<td>
      <div class="ql">${f.q}</div>${content}
    </td></tr>`;
  }).join('')).join('');
  return`
  <div class="preview-bar no-print" style="flex-direction:row-reverse">
    <div>
      <button class="btn-edit-last" onclick="goSec(${SECTIONS.length-1})">← تعديل</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:12px;color:${filled===total?'#0a7a4e':'#8a4200'};font-weight:700">${filled}/${total} حقل مكتمل</span>
      <button class="btn-print" style="background:${role.color}" onclick="doPrint()">طباعة / حفظ PDF</button>
    </div>
  </div>
  ${progressBar()}
  <div class="preview-bar">
    <div class="preview-meta">
      <h2>SOP — نموذج S.T.A.N.D.A.R.D.</h2>
      <p>${role.label} · ${ctx.label} · ${ST.task}</p>
    </div>
  </div>
  <div style="background:#fff;border:1px solid #e8e6e0;border-radius:12px;overflow:hidden">
    <table class="ptbl">
      <thead><tr><th style="width:34px"></th><th style="width:105px">القسم</th><th>التفاصيل</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

window.doPrint=function(){
  const role=ROLES.find(r=>r.id===ST.role);
  const ctx=role.contexts.find(c=>c.id===ST.ctx);
  const bodyRows=SECTIONS.map(sec=>{
    const cells=sec.fields.map(f=>{
      const ans=ST.answers[f.key]||'';
      return`<td style="border:0.5px solid #ccc;padding:5px 7px;vertical-align:top;text-align:right;direction:rtl">
        <div style="font-size:7px;color:#aaa;font-weight:700;margin-bottom:3px;line-height:1.2">${f.q}</div>
        <div style="font-size:9px;color:${ans?sec.color:'#ccc'};font-weight:${ans?'700':'400'};line-height:1.4">${ans||'— غير مكتمل'}</div>
      </td>`;
    }).join('');
    return`<tr>
      <td style="text-align:center;font-size:16px;font-weight:900;color:${sec.color};background:${sec.bg};border:0.5px solid #ccc;width:26px;padding:3px;font-family:-apple-system,sans-serif">${sec.letter}</td>
      <td style="font-weight:800;font-size:8.5px;color:#333;background:#f9f8f5;border:0.5px solid #ccc;width:68px;padding:5px 6px;vertical-align:middle;text-align:right;direction:rtl">${sec.name}<br><span style="font-size:6.5px;color:#aaa;font-weight:400">${sec.ename}</span></td>
      ${cells}
    </tr>`;
  }).join('');
  const filled=totalFilled(),total=totalFields();
  const html=`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8">

  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
  else{alert('من فضلك اسمح بفتح النوافذ المنبثقة ثم اضغط طباعة مرة تانية');}
};
